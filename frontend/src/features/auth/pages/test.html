<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HouseFlow - Join Sunset Heights</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22C55E",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between border-b border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">HouseFlow</h2>
</div>
<!-- Hero Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 @[480px]:rounded-lg min-h-[200px] relative" data-alt="Modern apartment building exterior under clear sky" style='background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0) 60%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuCh-M_H9YTtUlZwszubHw2upfiz5s0nKdu5gnmCrg_gDB1O4wVYAOH0cGzkSd0EvzTtRuap8CnxLBvionhAQhVOwWM0INZRgYKhTG8uWWZxDbzRTnPpAyvaDIpKktIIbOJnvbK5dAUKBRIaTYIbTWIFLyqf29iDkADf1NWGt-SCIdPFj7mv8ylImTOXy_xhQ0oGYbguQNBc6jM4IqP9UuK2wNuL11ezk70g1r_sUKXFC8VL-z9cp941TppmK0OVh25Kuh1-8w4_MVk");'>
<div class="flex flex-col p-6">
<p class="text-white tracking-tight text-2xl font-bold leading-tight">You've been invited to join Sunset Heights</p>
<p class="text-white/90 text-sm font-medium mt-1 uppercase tracking-wider">Managed by John Smith</p>
</div>
</div>
</div>
</div>
<!-- Progress Stepper -->
<div class="px-6 py-8">
<div class="flex items-center justify-between relative">
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-2 z-10">
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white font-bold ring-4 ring-primary/20">1</div>
<span class="text-xs font-semibold text-primary">Account</span>
</div>
<!-- Line -->
<div class="absolute top-5 left-0 w-full h-[2px] bg-slate-200 dark:bg-slate-700 -z-0"></div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-2 z-10">
<div class="size-10 rounded-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 font-bold">2</div>
<span class="text-xs font-medium text-slate-500">Photo</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2 z-10">
<div class="size-10 rounded-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 font-bold">3</div>
<span class="text-xs font-medium text-slate-500">Complete</span>
</div>
</div>
</div>
<!-- Info Box -->
<div class="px-4 mb-6">
<div class="bg-primary/10 border border-primary/20 rounded-xl p-4 flex gap-3">
<span class="material-symbols-outlined text-primary">bolt</span>
<p class="text-sm text-slate-700 dark:text-slate-300">
                    Your electricity will be billed at <span class="font-bold text-primary">$9/unit</span> as per your lease agreement.
                </p>
</div>
</div>
<!-- Form Section -->
<div class="px-4 flex flex-col gap-6 pb-12">
<!-- Full Name -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Full Name</span>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary" type="text" value="Jane Doe"/>
</label>
<!-- Email (Read Only) -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Email Address</span>
<div class="relative">
<input class="form-input w-full rounded-xl border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 h-14 px-4 text-slate-500 cursor-not-allowed" readonly="" type="email" value="jane.doe@example.com"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 size-5">lock</span>
</div>
</label>
<!-- Password -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Create Password</span>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="Min. 8 characters" type="password"/>
</label>
<!-- Emergency Contact -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Emergency Contact Number</span>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 px-4 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="+1 (555) 000-0000" type="tel"/>
</label>
<!-- Submit Button -->
<div class="mt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-primary/20">
                    Next: Upload Photo
                </button>
<p class="text-center text-xs text-slate-500 mt-4 px-8">
                    By continuing, you agree to HouseFlow's Terms of Service and Privacy Policy.
                </p>
</div>
</div>
</div>
</body></html>
